<title>infiniTensor summer camp 2026</title>
<style>
:root {
  color-scheme: light;
  --ink: #172033;
  --muted: #5d6778;
  --line: #d9e0ea;
  --paper: #ffffff;
  --bg: #f5f7fb;
  --accent: #155bd5;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",

.topbar { display: flex; justify-content: space-between; gap: 16px; color: var(--muted); font-size: 14px; }
.hero { padding: 28px 0 18px; border-bottom: 1px solid var(--line); }
h1 { margin: 0; font-size: 36px; line-height: 1.18; letter-spacing: 0; }
p { margin: 10px 0 0; }
.course-list { display: grid; gap: 14px; margin-top: 24px; }
.course-card { display: block; background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 18px; color: inherit; text-decoration: none; }
.course-card strong { display: block; color: var(--accent); font-size: 19px; }
.course-card span { display: block; color: var(--muted); margin-top: 6px; }
@media (max-width: 720px) { .page { padding: 16px 12px 44px; } .hero { padding: 20px 0 14px; } h1 { font-size: 29px; } }
</style>
</head>
